<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EarunWu</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #161616;
        background: #f7f5ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(100%, 560px);
      }

      p {
        margin: 0 0 18px;
        color: #57534e;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0;
      }

      a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid #161616;
        border-radius: 8px;
        color: #161616;
        background: #ffffff;
        text-decoration: none;
        font-weight: 700;
        box-shadow: 0 6px 0 #161616;
      }

      a:focus-visible {
        outline: 3px solid #f7c948;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EarunWu</h1>
      <p>GitHub Pages</p>
      <a href="session-converter/">Session 转换</a>
    </main>
  </body>
</html>
